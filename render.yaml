services:
  - type: web
    name: conmaret-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: GOOGLE_CREDS_FILE
        value: conmaret-key.json
      - key: GOOGLE_CREDS
        sync: false
    disks:
      - name: google-creds
        mountPath: /app
        sizeGB: 1